<style>
    body {
        margin: 0;
        padding: 40px;
        background: #0a1a33;
        color: white;
        border: 50px solid transparent;
        border-image: url('https://i.imgur.com/8pQm2qH.jpeg') 60 round;
        box-shadow: inset 0 0 40px rgba(120, 160, 255, 0.25);
    }

    .container {
        position: relative;
        width: 600px;
        margin: 50px auto;
    }


    .container img.main {
        width: 100%;
        display: block;
    }


    .hotspot {
        position: absolute;
        cursor: pointer;
    }


    .popup {
        position: absolute;
        top: -10%;
        left: 100%;
        width: 65px;
        height: 65px;
        overflow: hidden;
        background: none;
        border: 0px solid blue;
        padding: 5%;
        display: block;
        z-index: 10;
    }


    .popup img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.8s ease;
    }


    .popup:hover img {
        transform: scale(1.4);
    }
</style>
